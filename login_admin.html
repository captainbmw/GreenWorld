<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin Login | Greenworld Care</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --blue: #60a5fa;
            --red: #ef4444;
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.16);
        }

        * { box-sizing: border-box; }
        html, body { width: 100%; max-width: 100%; overflow-x: hidden; }
        body { min-width: 320px; }
        main, section, header, footer, nav { min-width: 0; }
        img, video, iframe { max-width: 100%; height: auto; }
        table { width: 100%; }

        body {
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            background: #020711;
            color: #fff;
            font-family: "Inter", sans-serif;
        }

        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: -2;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 18% 16%, rgba(96, 165, 250, 0.18), transparent 32%),
                radial-gradient(circle at 78% 28%, rgba(212, 175, 55, 0.12), transparent 30%),
                linear-gradient(135deg, #020711 0%, #061827 52%, #030d08 100%);
        }

        .auth-shell {
            min-height: 100vh;
            padding: 48px 1rem;
            display: grid;
            place-items: center;
        }

        .admin-card {
            width: min(470px, 100%);
            padding: 36px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-top: 4px solid var(--gold);
            border-radius: 28px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 34px 80px rgba(0, 0, 0, 0.45);
        }

        .security-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(96, 165, 250, 0.12);
            border: 1px solid rgba(96, 165, 250, 0.24);
            border-radius: 999px;
            color: #b8d7ff;
            font-size: 0.74rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 24px;
        }

        .logo-box {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-box i {
            width: 74px;
            height: 74px;
            border-radius: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            background: rgba(212, 175, 55, 0.12);
            border: 1px solid rgba(212, 175, 55, 0.25);
            font-size: 2.25rem;
        }

        .logo-box h1 {
            margin: 16px 0 6px;
            font-size: 2rem;
            font-weight: 800;
        }

        .logo-box p { color: rgba(255, 255, 255, 0.62); margin: 0; }

        .form-label {
            color: rgba(255, 255, 255, 0.88);
            font-size: 0.78rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .input-wrap { position: relative; }

        .input-wrap i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.065);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            color: #fff;
            padding: 14px 16px 14px 46px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--blue);
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.18);
            color: #fff;
        }

        .btn-admin {
            width: 100%;
            border: none;
            border-radius: 15px;
            padding: 15px;
            color: #07130d;
            background: linear-gradient(135deg, #f3d56b, var(--gold));
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            transition: 0.25s ease;
            box-shadow: 0 14px 28px rgba(212, 175, 55, 0.2);
        }

        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 36px rgba(212, 175, 55, 0.3);
        }

        .admin-links a {
            color: rgba(255, 255, 255, 0.66);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 700;
        }

        .admin-links a:first-child { color: #f3d56b; }
        .admin-links a:hover { text-decoration: underline; }

        .notice {
            margin-top: 22px;
            color: rgba(255, 255, 255, 0.48);
            font-size: 0.78rem;
            line-height: 1.6;
            text-align: center;
        }

        .status-message {
            min-height: 22px;
            margin-top: 14px;
            color: #fca5a5;
            font-size: 0.85rem;
            font-weight: 700;
            text-align: center;
        }

        @media (max-width: 420px) {
            .auth-shell { padding: 28px 0.75rem; }
            .admin-card { padding: 24px 20px; border-radius: 24px; }
            .logo-box i { width: 62px; height: 62px; border-radius: 20px; }
            .logo-box h1 { font-size: 1.65rem; }
            .form-control { min-height: 48px; }
        }

        @media (min-width: 1400px) {
            .admin-card { width: min(520px, 100%); padding: 42px; }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas" aria-hidden="true"></canvas>

    <main class="auth-shell">
        <section class="admin-card">
            <div class="text-center">
                <span class="security-badge"><i class="bi bi-shield-check"></i> Secure Staff Gateway</span>
            </div>
            <div class="logo-box">
                <i class="bi bi-shield-lock-fill"></i>
                <h1>Admin Portal</h1>
                <p>Secure access for Greenworld operations.</p>
            </div>

            <form id="adminLoginForm">
                <div class="mb-3">
                    <label for="lAdminUser" class="form-label">Username</label>
                    <div class="input-wrap">
                        <i class="bi bi-person-badge"></i>
                        <input type="text" id="lAdminUser" class="form-control" placeholder="Administrative username" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="lAdminPass" class="form-label">Password</label>
                    <div class="input-wrap">
                        <i class="bi bi-key"></i>
                        <input type="password" id="lAdminPass" class="form-control" placeholder="Password" required>
                    </div>
                </div>
                <button type="submit" class="btn-admin">Login as Admin</button>
            </form>

            <div id="adminLoginStatus" class="status-message" aria-live="polite"></div>

            <div class="admin-links text-center mt-4">
                <a href="register_admin.html">Register New Admin</a><br>
                <a href="index.html" class="d-inline-block mt-2">Customer Login</a>
            </div>

            <p class="notice">Administrative actions affect the public product catalog. Use authorized credentials only.</p>
        </section>
    </main>

    <script>
        document.getElementById("adminLoginForm").addEventListener("submit", function(event) {
            event.preventDefault();
            const user = document.getElementById("lAdminUser").value.trim();
            const allowed = ["Susan", "susan", "CaptainBMW", "captainbmw"];
            const status = document.getElementById("adminLoginStatus");

            if (allowed.includes(user)) {
                localStorage.setItem("gw_role", "admin");
                window.location.href = "dashboard.html";
            } else {
                status.textContent = "Unauthorized access. Invalid admin credentials.";
            }
        });

        initPremiumBackground();

        function initPremiumBackground() {
            const canvas = document.getElementById("bg-canvas");
            const ctx = canvas.getContext("2d");
            const particles = [];
            const pointer = { x: 0, y: 0 };
            const count = window.matchMedia("(max-width: 768px)").matches ? 80 : 150;

            function resize() {
                const ratio = Math.min(window.devicePixelRatio || 1, 2);
                canvas.width = window.innerWidth * ratio;
                canvas.height = window.innerHeight * ratio;
                canvas.style.width = `${window.innerWidth}px`;
                canvas.style.height = `${window.innerHeight}px`;
                ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
            }

            function makeParticle() {
                return {
                    x: (Math.random() - 0.5) * window.innerWidth * 1.5,
                    y: (Math.random() - 0.5) * window.innerHeight * 1.5,
                    z: Math.random() * 900 + 100,
                    speed: Math.random() * 0.62 + 0.24,
                    size: Math.random() * 1.75 + 0.6,
                    hue: Math.random() > 0.55 ? 210 : 45
                };
            }

            function reset(item) {
                Object.assign(item, makeParticle(), { z: 980 });
            }

            function draw() {
                ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
                const cx = window.innerWidth / 2;
                const cy = window.innerHeight / 2;

                particles.forEach(item => {
                    item.z -= item.speed;
                    if (item.z <= 1) reset(item);

                    const depth = 480 / item.z;
                    const x = cx + (item.x + pointer.x * 0.018) * depth;
                    const y = cy + (item.y + pointer.y * 0.018) * depth;
                    const radius = Math.max(0.22, item.size * depth * 2.1);

                    if (x < -60 || x > window.innerWidth + 60 || y < -60 || y > window.innerHeight + 60) {
                        reset(item);
                        return;
                    }

                    ctx.beginPath();
                    ctx.fillStyle = `hsla(${item.hue}, 88%, 68%, ${Math.min(0.85, depth * 0.82)})`;
                    ctx.shadowColor = `hsla(${item.hue}, 88%, 68%, 0.5)`;
                    ctx.shadowBlur = 12;
                    ctx.arc(x, y, radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                });

                requestAnimationFrame(draw);
            }

            resize();
            for (let i = 0; i < count; i += 1) particles.push(makeParticle());
            window.addEventListener("resize", resize);
            window.addEventListener("mousemove", event => {
                pointer.x = event.clientX - window.innerWidth / 2;
                pointer.y = event.clientY - window.innerHeight / 2;
            });
            draw();
        }
    </script>
</body>
</html>
