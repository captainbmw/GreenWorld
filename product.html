<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Products | Greenworld Care Wellness</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #8bc34a;
            --forest: #0a5c36;
            --gold: #d4af37;
            --blue: #60a5fa;
            --glass: rgba(255, 255, 255, 0.075);
            --glass-border: rgba(255, 255, 255, 0.16);
            --muted: rgba(255, 255, 255, 0.68);
        }

        * { box-sizing: border-box; }
        html, body { width: 100%; max-width: 100%; overflow-x: hidden; }
        body { min-width: 320px; }
        main, section, header, footer, nav { min-width: 0; }
        img, video, iframe { max-width: 100%; height: auto; }
        table { width: 100%; }

        body {
            margin: 0;
            min-height: 100vh;
            background: #04110d;
            color: #fff;
            font-family: "Inter", sans-serif;
            overflow-x: hidden;
        }

        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: -2;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 18% 14%, rgba(139, 195, 74, 0.16), transparent 30%),
                radial-gradient(circle at 82% 20%, rgba(96, 165, 250, 0.16), transparent 32%),
                linear-gradient(135deg, #03120c 0%, #071a28 50%, #020611 100%);
        }

        .top-nav {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(3, 10, 14, 0.78);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(18px);
        }

        .brand-link {
            color: white;
            text-decoration: none;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 0;
        }

        .main-content {
            padding: 58px 1rem 70px;
        }

        .catalog-header {
            max-width: 820px;
            margin: 0 auto 42px;
            text-align: center;
        }

        .catalog-header h1 {
            font-weight: 800;
            font-size: clamp(2.4rem, 7vw, 5.4rem);
            line-height: 0.98;
            margin-bottom: 18px;
        }

        .catalog-header p {
            color: var(--muted);
            font-size: 1.06rem;
            margin: 0 auto;
            max-width: 660px;
        }

        .catalog-tools {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 16px;
            backdrop-filter: blur(16px);
            margin-bottom: 28px;
        }

        .form-control,
        .form-select {
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.14);
            color: white;
            padding: 12px 16px;
        }

        .form-control::placeholder { color: rgba(255, 255, 255, 0.42); }
        .form-control:focus,
        .form-select:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--blue);
            color: white;
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.18);
        }
        .form-select option { background: #0f2c1f; color: #fff; }

        .product-card {
            position: relative;
            height: 100%;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            overflow: hidden;
            backdrop-filter: blur(18px);
            box-shadow: 0 24px 46px rgba(0, 0, 0, 0.28);
            transition: transform 0.25s ease, border-color 0.25s ease;
        }

        .product-card:hover {
            transform: translateY(-6px);
            border-color: rgba(96, 165, 250, 0.34);
        }

        .catalog-groups {
            display: grid;
            gap: 44px;
        }

        .package-section {
            min-width: 0;
        }

        .package-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        }

        .package-section-header h2 {
            color: #fff;
            font-size: clamp(1.4rem, 3vw, 2rem);
            font-weight: 800;
            margin: 0;
        }

        .package-section-header span {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            font-weight: 800;
            white-space: nowrap;
        }

        .product-img-box {
            height: 267px;
            background: rgba(0, 0, 0, 0.22);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 14px;
        }

        .product-img-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .product-info { padding: 22px; }

        .category-pill {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 2;
            background: rgba(10, 92, 54, 0.92);
            color: #fff;
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .price-tag {
            color: var(--gold);
            font-weight: 800;
            font-size: 1.28rem;
        }

        .benefit-text,
        .description-text {
            color: rgba(255, 255, 255, 0.68);
            font-size: 0.92rem;
            line-height: 1.58;
        }

        .benefit-text {
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .meta-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 14px 0 18px;
        }

        .meta-chip {
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.74);
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 0.76rem;
            font-weight: 700;
        }

        .btn-order {
            background: #25d366;
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 12px;
            font-weight: 800;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            transition: 0.25s;
        }

        .btn-order:hover {
            background: #128c7e;
            color: #fff;
            transform: translateY(-1px);
        }

        .admin-actions {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }

        body.is-admin .admin-actions { display: grid; }

        .empty-state {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 48px 24px;
            backdrop-filter: blur(16px);
        }

        @media (max-width: 768px) {
            .main-content { padding-top: 40px; }
            .product-img-box { height: 267px; }
            .catalog-tools { border-radius: 18px; }
        }

        @media (max-width: 420px) {
            .top-nav .container { gap: 10px; }
            .brand-link { font-size: 0.95rem; }
            .top-nav .btn { padding-left: 0.75rem !important; padding-right: 0.75rem !important; }
            .main-content { padding: 34px 0.75rem 54px; }
            .catalog-header { margin-bottom: 28px; }
            .catalog-header h1 { font-size: 2.15rem; }
            .catalog-tools { padding: 12px; }
            .package-section-header { align-items: flex-start; flex-direction: column; gap: 6px; }
            .product-info { padding: 18px; }
        }

        @media (min-width: 1400px) {
            .container { max-width: 1320px; }
            .product-img-box { height: 300px; }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas" aria-hidden="true"></canvas>

    <nav class="top-nav">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="brand-link" href="index.html"><i class="bi bi-tree-fill"></i> Greenworld Care</a>
            <div class="d-flex gap-2">
                <a href="index.html" class="btn btn-sm btn-outline-light rounded-pill px-3">Home</a>
                <a href="dashboard.html" class="btn btn-sm btn-success rounded-pill px-3 admin-link">Dashboard</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <header class="catalog-header">
                <h1>Wellness Catalog</h1>
                <p>Premium Greenworld wellness products with clear benefits, package details, and fast ordering.</p>
            </header>

            <section class="catalog-tools">
                <div class="row g-3">
                    <div class="col-lg-8">
                        <input type="search" id="searchInput" class="form-control" placeholder="Search products, benefits, or product ID">
                    </div>
                    <div class="col-lg-4">
                        <select id="categoryFilter" class="form-select">
                            <option value="all">All package categories</option>
                        </select>
                    </div>
                </div>
            </section>

            <div class="catalog-groups" id="storeGrid"></div>

            <div id="noProducts" class="empty-state text-center" style="display: none;">
                <i class="bi bi-bag-x fs-1 text-white-50 mb-3 d-block"></i>
                <h3>No products available</h3>
                <p class="text-white-50 mb-3">The catalog is ready for new product entries.</p>
                <a href="add_product.html" class="btn btn-success rounded-pill px-4 admin-link">Add Product</a>
            </div>
        </div>
    </main>

    <script>
        const storageKeys = {
            products: "greenworld_products",
            packages: "greenworld_packages",
            editProduct: "gw_edit_product_id"
        };
        const imageDbConfig = {
            name: "greenworld_catalog_assets",
            version: 1,
            store: "product_images"
        };

        const defaultPackages = [
            { id: "detox", name: "Detox" },
            { id: "immunity", name: "Immunity" },
            { id: "vitality", name: "Vitality" },
            { id: "skincare", name: "Skincare" }
        ];

        let products = loadList(storageKeys.products, []);
        const packages = loadList(storageKeys.packages, defaultPackages);
        const grid = document.getElementById("storeGrid");
        const noProducts = document.getElementById("noProducts");
        const searchInput = document.getElementById("searchInput");
        const categoryFilter = document.getElementById("categoryFilter");
        const isAdmin = localStorage.getItem("gw_role") === "admin";
        const objectUrls = new Set();

        if (isAdmin) {
            document.body.classList.add("is-admin");
        } else {
            document.querySelectorAll(".admin-link").forEach(link => link.style.display = "none");
        }

        function loadList(key, fallback) {
            try {
                return JSON.parse(localStorage.getItem(key)) || fallback;
            } catch (error) {
                return fallback;
            }
        }

        function openImageDb() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(imageDbConfig.name, imageDbConfig.version);

                request.onupgradeneeded = () => {
                    const db = request.result;
                    if (!db.objectStoreNames.contains(imageDbConfig.store)) {
                        db.createObjectStore(imageDbConfig.store);
                    }
                };

                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function getProductImageUrl(key) {
            if (!key) return "";
            const db = await openImageDb();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(imageDbConfig.store, "readonly");
                const request = transaction.objectStore(imageDbConfig.store).get(key);
                request.onsuccess = () => {
                    db.close();
                    if (!request.result) {
                        resolve("");
                        return;
                    }

                    const url = URL.createObjectURL(request.result);
                    objectUrls.add(url);
                    resolve(url);
                };
                request.onerror = () => {
                    db.close();
                    reject(request.error);
                };
            });
        }

        async function deleteProductImage(key) {
            if (!key) return;
            const db = await openImageDb();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(imageDbConfig.store, "readwrite");
                transaction.objectStore(imageDbConfig.store).delete(key);
                transaction.oncomplete = () => {
                    db.close();
                    resolve();
                };
                transaction.onerror = () => {
                    db.close();
                    reject(transaction.error);
                };
            });
        }

        function escapeHtml(value) {
            return String(value ?? "").replace(/[&<>"']/g, (char) => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#039;"
            }[char]));
        }

        function getPackageName(id) {
            return packages.find(pkg => pkg.id === id)?.name || id || "Wellness";
        }

        function saveProducts() {
            localStorage.setItem(storageKeys.products, JSON.stringify(products));
        }

        function renderCategories() {
            categoryFilter.innerHTML += packages.map(pkg => `<option value="${escapeHtml(pkg.id)}">${escapeHtml(pkg.name)}</option>`).join("");
        }

        function productMatches(product) {
            const query = searchInput.value.trim().toLowerCase();
            const category = categoryFilter.value;
            const haystack = [
                product.name,
                product.productId,
                product.description,
                product.benefits,
                getPackageName(product.category)
            ].join(" ").toLowerCase();

            return (!query || haystack.includes(query)) && (category === "all" || product.category === category);
        }

        function groupProductsByPackage(productList) {
            const groups = new Map();
            productList.forEach(product => {
                const key = product.category || "uncategorized";
                if (!groups.has(key)) {
                    groups.set(key, {
                        id: key,
                        name: getPackageName(key),
                        products: []
                    });
                }
                groups.get(key).products.push(product);
            });

            return [...groups.values()].sort((a, b) => {
                const aIndex = packages.findIndex(pkg => pkg.id === a.id);
                const bIndex = packages.findIndex(pkg => pkg.id === b.id);
                if (aIndex === -1 && bIndex === -1) return a.name.localeCompare(b.name);
                if (aIndex === -1) return 1;
                if (bIndex === -1) return -1;
                return aIndex - bIndex;
            });
        }

        function renderProductCard(product) {
            const whatsappMsg = encodeURIComponent(`Hello Susan, I'm interested in ordering: ${product.name} (Ksh ${product.price})`);

            return `
                <div class="col-md-6 col-xl-4">
                    <article class="product-card">
                        <span class="category-pill">${escapeHtml(getPackageName(product.category))}</span>
                        <div class="product-img-box">
                            <img data-product-image="${escapeHtml(product.id)}" src="${escapeHtml(product.image || "https://placehold.co/700x520/0a5c36/ffffff?text=Greenworld+Wellness")}" alt="${escapeHtml(product.name)}">
                        </div>
                        <div class="product-info">
                            <div class="d-flex justify-content-between gap-3 align-items-start mb-2">
                                <h2 class="h5 fw-bold mb-0">${escapeHtml(product.name)}</h2>
                                <div class="price-tag">Ksh ${escapeHtml(product.price || "0.00")}</div>
                            </div>
                            <div class="meta-row">
                                <span class="meta-chip">ID: ${escapeHtml(product.productId || "N/A")}</span>
                                <span class="meta-chip">BV: ${escapeHtml(product.bv || "0")}</span>
                            </div>
                            <p class="description-text">${escapeHtml(product.description || "")}</p>
                            <p class="benefit-text"><strong class="text-white">Benefits:</strong> ${escapeHtml(product.benefits || "")}</p>
                            <a href="https://wa.me/254724415604?text=${whatsappMsg}" class="btn-order" onclick="recordPurchase('${escapeHtml(product.name)}', '${escapeHtml(product.price)}', '${escapeHtml(product.bv)}')">
                                <i class="bi bi-whatsapp"></i> Order on WhatsApp
                            </a>
                            <div class="admin-actions">
                                <button class="btn btn-outline-info rounded-pill" type="button" onclick="editProduct('${escapeHtml(product.id)}')">
                                    <i class="bi bi-pencil me-1"></i> Edit
                                </button>
                                <button class="btn btn-outline-danger rounded-pill" type="button" onclick="deleteProduct('${escapeHtml(product.id)}')">
                                    <i class="bi bi-trash me-1"></i> Delete
                                </button>
                            </div>
                        </div>
                    </article>
                </div>
            `;
        }

        async function hydrateProductImages(visibleProducts) {
            for (const product of visibleProducts) {
                if (!product.imageKey) continue;

                const image = document.querySelector(`[data-product-image="${CSS.escape(product.id)}"]`);
                if (!image) continue;

                try {
                    const url = await getProductImageUrl(product.imageKey);
                    if (url) image.src = url;
                } catch (error) {
                    console.warn("Unable to load product image", error);
                }
            }
        }

        window.recordPurchase = function(productName, price, bv) {
            const userJson = localStorage.getItem("gw_current_user");
            if (!userJson) {
                alert("Please login to your account to place an order.");
                window.location.href = "login.html";
                return;
            }
            const user = JSON.parse(userJson);
            
            const orders = JSON.parse(localStorage.getItem("greenworld_orders")) || [];
            orders.push({
                customerName: user.fullName,
                customerEmail: user.email,
                productName: productName,
                price: price,
                bv: parseFloat(bv) || 0,
                timestamp: new Date().toISOString()
            });
            localStorage.setItem("greenworld_orders", JSON.stringify(orders));
        };

        function renderProducts() {
            objectUrls.forEach(url => URL.revokeObjectURL(url));
            objectUrls.clear();

            const visibleProducts = products.filter(productMatches);
            grid.innerHTML = "";
            noProducts.style.display = visibleProducts.length ? "none" : "block";

            groupProductsByPackage(visibleProducts).forEach(group => {
                const section = document.createElement("section");
                section.className = "package-section";
                section.innerHTML = `
                    <div class="package-section-header">
                        <h2>${escapeHtml(group.name)}</h2>
                        <span>${group.products.length} product${group.products.length === 1 ? "" : "s"}</span>
                    </div>
                    <div class="row g-4">
                        ${group.products.map(renderProductCard).join("")}
                    </div>
                `;
                grid.appendChild(section);
            });

            hydrateProductImages(visibleProducts);
        }

        window.editProduct = function(id) {
            localStorage.setItem(storageKeys.editProduct, id);
            window.location.href = "add_product.html";
        };

        window.deleteProduct = async function(id) {
            const product = products.find(item => item.id === id);
            if (!product || !confirm(`Delete "${product.name}" from the catalog?`)) return;

            products = products.filter(item => item.id !== id);
            saveProducts();
            await deleteProductImage(product.imageKey);
            renderProducts();
        };

        function initPremiumBackground() {
            const canvas = document.getElementById("bg-canvas");
            const ctx = canvas.getContext("2d");
            const particles = [];
            const count = window.matchMedia("(max-width: 768px)").matches ? 85 : 160;
            const pointer = { x: 0, y: 0 };

            function resize() {
                const ratio = Math.min(window.devicePixelRatio || 1, 2);
                canvas.width = window.innerWidth * ratio;
                canvas.height = window.innerHeight * ratio;
                canvas.style.width = `${window.innerWidth}px`;
                canvas.style.height = `${window.innerHeight}px`;
                ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
            }

            function particle() {
                return {
                    x: (Math.random() - 0.5) * window.innerWidth * 1.5,
                    y: (Math.random() - 0.5) * window.innerHeight * 1.5,
                    z: Math.random() * 900 + 120,
                    speed: Math.random() * 0.55 + 0.2,
                    size: Math.random() * 1.6 + 0.7,
                    hue: Math.random() > 0.48 ? 210 : 92
                };
            }

            function reset(item) {
                Object.assign(item, particle(), { z: 980 });
            }

            function draw() {
                ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
                const cx = window.innerWidth / 2;
                const cy = window.innerHeight / 2;

                particles.forEach(item => {
                    item.z -= item.speed;
                    if (item.z <= 1) reset(item);

                    const depth = 470 / item.z;
                    const x = cx + (item.x + pointer.x * 0.02) * depth;
                    const y = cy + (item.y + pointer.y * 0.02) * depth;
                    const r = Math.max(0.22, item.size * depth * 2.1);

                    if (x < -60 || x > window.innerWidth + 60 || y < -60 || y > window.innerHeight + 60) {
                        reset(item);
                        return;
                    }

                    ctx.beginPath();
                    ctx.fillStyle = `hsla(${item.hue}, 86%, 68%, ${Math.min(0.85, depth * 0.8)})`;
                    ctx.shadowColor = `hsla(${item.hue}, 86%, 68%, 0.5)`;
                    ctx.shadowBlur = 12;
                    ctx.arc(x, y, r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                });

                requestAnimationFrame(draw);
            }

            resize();
            for (let i = 0; i < count; i += 1) particles.push(particle());
            window.addEventListener("resize", resize);
            window.addEventListener("mousemove", event => {
                pointer.x = event.clientX - window.innerWidth / 2;
                pointer.y = event.clientY - window.innerHeight / 2;
            });
            draw();
        }

        renderCategories();
        renderProducts();
        initPremiumBackground();
        searchInput.addEventListener("input", renderProducts);
        categoryFilter.addEventListener("change", renderProducts);
    </script>
</body>
</html>
