<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Products | Green World Care</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
:root {
    --forest-green: #006400;
    --forest-green-dark: #004d00;
    --forest-green-light: #e0f0e0;
    --grey-bg: #f4f7f6;
    --card-white: #ffffff;
    --text-dark: #1a2c1e;
    --footer-bg: #1e2a2a;
    --forest: #0a5c36;
    --forest-deep: #063d24;
    --forest-glow: #1a8f55;
    --gold: #d4af37;
    --gold-light: #f0e6b8;
    --surface: #f7faf8;
    --text: #0f1f14;
    --text-muted: #5a6f62;
    --glass: rgba(255, 255, 255, 0.08);
    --glass-border: rgba(255, 255, 255, 0.18);
    --green: #7dff9c;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(140deg, #020705, #04120f, #071d18, #020705);
    min-height: 100vh;
    overflow-x: hidden;
    color: white;
}

/* NAVBAR */
.navbar-forest { 
    background: linear-gradient(135deg, var(--forest-green) 0%, var(--forest-green-dark) 100%); 
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08); 
    padding: 0.7rem 1rem; 
    transition: all 0.2s; 
    position: sticky;
    top: 0;
    z-index: 1000;
}

.navbar-brand { 
    font-weight: 700; 
    font-size: 1.65rem; 
    letter-spacing: -0.5px; 
    color: white !important; 
    display: flex; 
    align-items: center; 
    gap: 10px; 
    text-decoration: none;
}

.navbar-brand i { font-size: 1.8rem; }

.navbar-brand span { 
    background: rgba(255,255,255,0.15); 
    padding: 0.2rem 0.6rem; 
    border-radius: 40px; 
    font-size: 0.75rem; 
    font-weight: 500; 
    margin-left: 6px; 
}

.nav-link-custom { 
    color: rgba(255, 255, 255, 0.9) !important; 
    font-weight: 500; 
    margin: 0 0.2rem; 
    border-radius: 40px; 
    transition: all 0.2s ease; 
    padding: 0.5rem 1rem; 
    text-decoration: none;
}

.nav-link-custom:hover, .nav-link-custom.active { 
    background: rgba(255, 255, 255, 0.18); 
    color: white !important; 
}

#adminLink, #logoutLink { display: none; }

/* TOOLBAR */
.toolbar{
    width:min(1400px,92%);
    margin:40px auto;
    padding:24px;
    border-radius:28px;
    background:var(--glass);
    backdrop-filter:blur(18px);
    border:1px solid var(--glass-border);
    position:relative;
}

.toolbar-grid{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
}

.search-box{
    position:relative;
}

.search-box input{
    width:100%;
    padding:18px 22px 18px 58px;
    border:none;
    outline:none;
    border-radius:18px;
    background:rgba(255,255,255,0.07);
    color:white;
    font-size:1rem;
    border:1px solid rgba(255,255,255,0.08);
    transition:0.35s;
}

.search-box input:focus{
    border-color:#5bc0ff;
    box-shadow:0 0 25px rgba(91,192,255,0.22);
}

.search-box svg{
    position:absolute;
    left:20px;
    top:50%;
    transform:translateY(-50%);
    opacity:0.6;
}

select{
    width:100%;
    padding:18px;
    border:none;
    outline:none;
    border-radius:18px;
    background:rgba(255,255,255,0.07);
    color:white;
    font-size:1rem;
    border:1px solid rgba(255,255,255,0.08);
}

option{
    background:#071612;
}

/* PRODUCTS LAYOUT */
.catalog{
    width:min(1400px,92%);
    margin:auto;
    padding-bottom:120px;
}

.products-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:28px;
}

.product-card{
    position:relative;
    border-radius:32px;
    overflow:hidden;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(18px);
    transition:0.3s ease;
    display: flex;
    flex-direction: column;
    height: 100%;
}

.product-card:hover{
    transform:translateY(-8px);
    border-color:var(--green);
}

.category-pill{
    position:absolute;
    top:18px;
    right:18px;
    z-index:5;
    padding:8px 12px;
    border-radius:999px;
    background:rgba(125,255,156,0.1);
    border:1px solid var(--green);
    color:var(--green);
    font-size:0.7rem;
    font-weight:800;
    text-transform:uppercase;
}

.product-image{
    height:220px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.product-image img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
}

.product-content{
    padding:20px;
    display: flex;
    flex-direction: column;
    flex-grow: 1;
}

.product-title{
    font-size:1.2rem;
    font-weight:800;
    margin-bottom:8px;
}

.product-desc{
    color:rgba(255,255,255,0.6);
    font-size:0.9rem;
    line-height:1.6;
    margin-bottom:20px;
}

.product-bottom{
    margin-top: auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.price{
    font-size:1.2rem;
    font-weight:800;
    color:#ffcc70;
}

.buy-btn{
    padding:10px 18px;
    border-radius:12px;
    font-weight:700;
    text-decoration: none;
    background:linear-gradient(135deg,#14d96b,#00a6ff);
    color:white;
}

.empty-state{ text-align:center; padding:60px; }
.footer{ padding:40px; text-align:center; color:rgba(255,255,255,0.4); border-top:1px solid rgba(255,255,255,0.1); }
</style>
</head>

<body>

<canvas id="bg-canvas" aria-hidden="true"></canvas>

<nav class="navbar navbar-expand-lg navbar-forest sticky-top">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="index.html"><i class="bi bi-tree-fill"></i> Greenworld Care<span><i class="bi bi-shield-heart"></i> Consultant</span></a>
        <div class="collapse navbar-collapse d-flex justify-content-end" id="navbarNav">
            <ul class="navbar-nav align-items-center gap-1" style="list-style: none; display: flex; flex-direction: row; margin: 0; padding: 0;">
                <li class="nav-item"><a class="nav-link nav-link-custom" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link nav-link-custom active" href="product.html">Store</a></li>
                <li class="nav-item" id="loginLink"><a class="nav-link nav-link-custom" href="login.html">Login</a></li>
                <li class="nav-item" id="registerLink"><a class="nav-link nav-link-custom" href="register.html">Register</a></li>
                <li class="nav-item" id="adminLink"><a class="nav-link nav-link-custom" href="dashboard.html">Dashboard</a></li>
                <li class="nav-item" id="logoutLink"><a class="nav-link nav-link-custom text-danger" href="javascript:void(0)" id="logoutBtn">Logout</a></li>
            </ul>
        </div>
    </div>
</nav>

<section class="toolbar">
    <div class="toolbar-grid">
        <div class="search-box">
            <svg width="22" height="22" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
            </svg>
            <input
                type="search"
                id="searchInput"
                placeholder="Search wellness products..."
            />
        </div>

        <div>
            <select id="categoryFilter">
                <option value="all">All Categories</option>
            </select>
        </div>
    </div>
</section>

<section class="catalog">
    <div class="products-grid" id="catalog"></div>
</section>

<div class="empty-state" id="emptyState" style="display: none;">
    <h3>No Products Found</h3>
    <p>No wellness products match your search criteria.</p>
</div>

<footer class="footer">
    © 2026 Green World Care — Futuristic Wellness Commerce
</footer>
<script type="module">
    import { db } from './js/firebase-config.js';
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { listenToProducts, listenToPackages, escapeHtml } from './js/products.js';

    const grid = document.getElementById("catalog");
    const noProducts = document.getElementById("emptyState");
    const searchInput = document.getElementById("searchInput");
    const categoryFilter = document.getElementById("categoryFilter");
    
    let currentProducts = [];
    let currentPackages = [];
    let renderingTriggered = false;

    // Navbar Logic
    const loginLink = document.getElementById('loginLink');
    const registerLink = document.getElementById('registerLink');
    const adminLink = document.getElementById('adminLink');
    const logoutLink = document.getElementById('logoutLink');
    const logoutBtn = document.getElementById('logoutBtn');

    function updateNavbar() {
        const role = localStorage.getItem('gw_role');
        const isAdmin = role === 'admin';

        if (isAdmin) {
            if (loginLink) loginLink.style.display = 'none';
            if (registerLink) registerLink.style.display = 'none';
            if (adminLink) adminLink.style.display = 'block';
            if (logoutLink) logoutLink.style.display = 'block';
        } else {
            if (loginLink) loginLink.style.display = 'block';
            if (registerLink) registerLink.style.display = 'block';
            if (adminLink) adminLink.style.display = 'none';
            if (logoutLink) logoutLink.style.display = 'none';
        }
    }

    if (logoutBtn) {
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('gw_role');
            localStorage.removeItem('gw_current_user');
            updateNavbar();
            window.location.reload(); 
        });
    }

    updateNavbar();

    // Lead Tracking Logic
    async function logLead(productName, price) {
        const userStr = localStorage.getItem("gw_current_user");
        const user = userStr ? JSON.parse(userStr) : { fullName: "Guest", email: "guest@example.com" };

        try {
            await addDoc(collection(db, "leads"), {
                customerName: user.fullName,
                customerEmail: user.email,
                productName: productName,
                price: price,
                bv: 20, 
                timestamp: serverTimestamp()
            });
            console.log("Lead logged successfully");
        } catch (error) {
            console.error("Error logging lead: ", error);
        }
    }

    if (grid) {
        grid.addEventListener('click', (e) => {
            const buyBtn = e.target.closest('.buy-btn');
            if (buyBtn) {
                const card = buyBtn.closest('.product-card');
                const productName = card.querySelector('.product-title').textContent;
                const price = card.querySelector('.price').textContent;
                logLead(productName, price);
            }
        });
    }

    function productMatches(product) {
        if (!searchInput || !categoryFilter) return true;
        
        const query = searchInput.value.trim().toLowerCase();
        const category = categoryFilter.value;
        const haystack = [
            product.name,
            product.description,
            (currentPackages.find(p => p.id === product.category)?.name || "")
        ].join(" ").toLowerCase();

        return (!query || haystack.includes(query)) && (category === "all" || product.category === category);
    }

    function renderProductCard(product) {
        const whatsappMsg = encodeURIComponent(`Hello Susan, I'm interested in ordering: ${product.name} (Ksh ${product.price})`);
        const imageSrc = product.image ? product.image : "https://placehold.co/700x520/0a5c36/ffffff?text=Greenworld+Wellness";
        const pkgName = currentPackages.find(p => p.id === product.category)?.name || "Wellness";

        return `
            <article class="product-card">
                <div class="card-glow"></div>
                <span class="category-pill">${escapeHtml(pkgName)}</span>
                <div class="product-image">
                    <img src="${imageSrc}" alt="${escapeHtml(product.name)}">
                </div>
                <div class="product-content">
                    <div>
                        <h2 class="product-title">${escapeHtml(product.name)}</h2>
                        <p class="product-desc">${escapeHtml(product.description || "")}</p>
                    </div>
                    <div class="product-bottom">
                        <div class="price">Ksh ${escapeHtml(product.price || "0.00")}</div>
                        <a href="https://wa.me/254724415604?text=${whatsappMsg}" class="buy-btn" target="_blank" rel="noopener noreferrer">
                            Order on WhatsApp
                        </a>
                    </div>
                </div>
            </article>
        `;
    }

    function renderProducts() {
        if (!grid) return;
        renderingTriggered = true;

        const visibleProducts = currentProducts.filter(productMatches);
        grid.innerHTML = visibleProducts.map(renderProductCard).join("");
        
        if (noProducts) {
            // FIXED CONDITION: If database returns absolutely no matching featured items, 
            // open up the empty state block cleanly instead of hanging blank.
            noProducts.style.display = (visibleProducts.length === 0) ? "block" : "none";
        }
    }

    function populateCategoryFilter(pkgs) {
        if (!categoryFilter) return;
        const currentVal = categoryFilter.value || "all";
        categoryFilter.innerHTML = '<option value="all">All Categories</option>';
        pkgs.forEach(pkg => {
            const option = document.createElement('option');
            option.value = pkg.id;
            option.textContent = pkg.name;
            categoryFilter.appendChild(option);
        });
        categoryFilter.value = currentVal;
    }

    try {
        listenToPackages(pkgs => {
            currentPackages = pkgs || [];
            populateCategoryFilter(currentPackages);
            if (currentProducts.length > 0) renderProducts();
        });
    } catch(e) { console.error("Catalog packages pipeline failed:", e); }

    try {
        listenToProducts(prods => {
            currentProducts = prods || [];
            renderProducts();
        });
    } catch(e) { console.error("Catalog products pipeline failed:", e); }


    // Backup connection channel
    setTimeout(() => {
        if (!renderingTriggered) {
            console.warn("Catalog streams stalled. Running fallback database pipeline...");
            
            if (window.db || (typeof firebase !== 'undefined' && firebase.firestore)) {
                const firestoreInstance = window.db || firebase.firestore();
                
                firestoreInstance.collection('packages').get().then(snapshot => {
                    currentPackages = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    populateCategoryFilter(currentPackages);
                    if (currentProducts.length > 0) renderProducts();
                }).catch(e => console.error(e));

                firestoreInstance.collection('products').onSnapshot(snapshot => {
                    currentProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    renderProducts();
                }, error => {
                    if (grid) grid.innerHTML = `<div class="text-center text-white-50 p-5"><p>Link error: ${error.message}</p></div>`;
                });
            }
        }
    }, 2500);


    if (searchInput) searchInput.addEventListener("input", renderProducts);
    if (categoryFilter) categoryFilter.addEventListener("change", renderProducts);

    const menuBtn = document.getElementById('menuBtn');
    const navLinks = document.getElementById('navLinks');
    if (menuBtn && navLinks) {
        menuBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
    }

    initParticles();

    function initParticles() {
        const canvas = document.getElementById("bg-canvas");
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        function makeParticle() { return { x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, size: Math.random() * 2, speed: Math.random() * 0.4 + 0.1 }; }
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height); 
            ctx.fillStyle = "rgba(125, 255, 156, 0.3)";
            particles.forEach(p => { 
                p.y -= p.speed; 
                if (p.y < 0) p.y = canvas.height; 
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); 
            });
            requestAnimationFrame(draw);
        }
        resize();
        for(let i=0; i<75; i++) particles.push(makeParticle());
        window.addEventListener("resize", resize);
        draw();
    }
</script>
</body>
</html>
