<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Products | Greenworld Care Wellness</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #8bc34a;
            --forest: #0a5c36;
            --gold: #d4af37;
            --blue: #60a5fa;
            --glass: rgba(255, 255, 255, 0.075);
            --glass-border: rgba(255, 255, 255, 0.16);
            --muted: rgba(255, 255, 255, 0.68);
        }

        * { box-sizing: border-box; }
        html, body { width: 100%; max-width: 100%; overflow-x: hidden; }
        body { min-width: 320px; }

        body {
            margin: 0;
            min-height: 100vh;
            background: #04110d;
            color: #fff;
            font-family: "Inter", sans-serif;
            overflow-x: hidden;
        }

        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: -2;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 18% 14%, rgba(139, 195, 74, 0.16), transparent 30%),
                radial-gradient(circle at 82% 20%, rgba(96, 165, 250, 0.16), transparent 32%),
                linear-gradient(135deg, #03120c 0%, #071a28 50%, #020611 100%);
        }

        .top-nav {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(3, 10, 14, 0.78);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(18px);
        }

        .brand-link {
            color: white;
            text-decoration: none;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 0;
        }

        .main-content {
            padding: 58px 1rem 70px;
        }

        .catalog-header {
            max-width: 820px;
            margin: 0 auto 42px;
            text-align: center;
        }

        .catalog-header h1 {
            font-weight: 800;
            font-size: clamp(2.4rem, 7vw, 5.4rem);
            line-height: 0.98;
            margin-bottom: 18px;
        }

        .catalog-header p {
            color: var(--muted);
            font-size: 1.06rem;
            margin: 0 auto;
            max-width: 660px;
        }

        .catalog-tools {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 16px;
            backdrop-filter: blur(16px);
            margin-bottom: 28px;
        }

        .form-control,
        .form-select {
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.14);
            color: white;
            padding: 12px 16px;
        }

        .form-control::placeholder { color: rgba(255, 255, 255, 0.42); }
        .form-control:focus,
        .form-select:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--blue);
            color: white;
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.18);
        }
        .form-select option { background: #0f2c1f; color: #fff; }

        .product-card {
            position: relative;
            height: 100%;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            overflow: hidden;
            backdrop-filter: blur(18px);
            box-shadow: 0 24px 46px rgba(0, 0, 0, 0.28);
            transition: transform 0.25s ease, border-color 0.25s ease;
        }

        .product-card:hover {
            transform: translateY(-6px);
            border-color: rgba(96, 165, 250, 0.34);
        }

        .catalog-groups {
            display: grid;
            gap: 44px;
        }

        .package-section {
            min-width: 0;
        }

        .package-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        }

        .package-section-header h2 {
            color: #fff;
            font-size: clamp(1.4rem, 3vw, 2rem);
            font-weight: 800;
            margin: 0;
        }

        .package-section-header span {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            font-weight: 800;
            white-space: nowrap;
        }

        .product-img-box {
            height: 200px;
            width: 100px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.22);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 5px;
        }

        .product-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info { padding: 22px; }

        .category-pill {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 2;
            background: rgba(10, 92, 54, 0.92);
            color: #fff;
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .price-tag {
            color: var(--gold);
            font-weight: 800;
            font-size: 1.28rem;
        }

        .description-text {
            color: rgba(255, 255, 255, 0.68);
            font-size: 0.92rem;
            line-height: 1.58;
            margin-bottom: 20px;
        }

        .btn-order {
            background: #25d366;
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 12px;
            font-weight: 800;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            transition: 0.25s;
        }

        .btn-order:hover {
            background: #128c7e;
            color: #fff;
            transform: translateY(-1px);
        }

        .empty-state {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 48px 24px;
            backdrop-filter: blur(16px);
        }

        @media (max-width: 768px) {
            .main-content { padding-top: 40px; }
            .product-img-box { height: 267px; }
            .catalog-tools { border-radius: 18px; }
        }

        @media (max-width: 420px) {
            .top-nav .container { gap: 10px; }
            .brand-link { font-size: 0.95rem; }
            .top-nav .btn { padding-left: 0.75rem !important; padding-right: 0.75rem !important; }
            .main-content { padding: 34px 0.75rem 54px; }
            .catalog-header { margin-bottom: 28px; }
            .catalog-header h1 { font-size: 2.15rem; }
            .catalog-tools { padding: 12px; }
            .package-section-header { align-items: flex-start; flex-direction: column; gap: 6px; }
            .product-info { padding: 18px; }
        }
        #adminBtn, #logoutBtn { display: none; }
    </style>
</head>
<body>
    <canvas id="bg-canvas" aria-hidden="true"></canvas>

    <nav class="top-nav">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="brand-link" href="index.html"><i class="bi bi-tree-fill"></i> Greenworld Care</a>
            <div class="d-flex gap-2">
                <a href="index.html" class="btn btn-sm btn-outline-light rounded-pill px-3">Home</a>
                <a href="login.html" id="loginBtn" class="btn btn-sm btn-outline-light rounded-pill px-3">Login</a>
                <a href="register.html" id="registerBtn" class="btn btn-sm btn-outline-light rounded-pill px-3">Register</a>
                <a href="add_product.html" id="adminBtn" class="btn btn-sm btn-success rounded-pill px-3">Dashboard</a>
                <button id="logoutBtn" class="btn btn-sm btn-danger rounded-pill px-3">Logout</button>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <header class="catalog-header">
                <h1>Wellness Catalog</h1>
                <p>Premium Greenworld wellness products with clear benefits, package details, and fast ordering.</p>
            </header>

            <section class="catalog-tools">
                <div class="row g-3">
                    <div class="col-lg-8">
                        <input type="search" id="searchInput" class="form-control" placeholder="Search products or descriptions...">
                    </div>
                    <div class="col-lg-4">
                        <select id="categoryFilter" class="form-select">
                            <option value="all">All package categories</option>
                            <option value="detox">Detox</option>
                            <option value="immunity">Immunity</option>
                            <option value="vitality">Vitality</option>
                            <option value="skincare">Skincare</option>
                        </select>
                    </div>
                </div>
            </section>

            <div class="catalog-groups" id="storeGrid"></div>

            <div id="noProducts" class="empty-state text-center" style="display: none;">
                <i class="bi bi-bag-x fs-1 text-white-50 mb-3 d-block"></i>
                <h3>No products available</h3>
                <p class="text-white-50 mb-3">The catalog is ready for new product entries.</p>
                <a href="add_product.html" class="btn btn-success rounded-pill px-4 admin-link">Add Product</a>
            </div>
        </div>
    </main>

    <script type="module">
        import { listenToProducts, listenToPackages, groupProducts, escapeHtml, getPackageName } from './js/products.js';

        const grid = document.getElementById("storeGrid");
        const noProducts = document.getElementById("noProducts");
        const searchInput = document.getElementById("searchInput");
        const categoryFilter = document.getElementById("categoryFilter");
        
        const loginBtn = document.getElementById("loginBtn");
        const registerBtn = document.getElementById("registerBtn");
        const adminBtn = document.getElementById("adminBtn");
        const logoutBtn = document.getElementById("logoutBtn");

        function updateNavbar() {
            const role = localStorage.getItem("gw_role");
            const isAdmin = role === "admin";

            if (isAdmin) {
                if (loginBtn) loginBtn.style.display = "none";
                if (registerBtn) registerBtn.style.display = "none";
                if (adminBtn) adminBtn.style.display = "inline-block";
                if (logoutBtn) logoutBtn.style.display = "inline-block";
            } else {
                if (loginBtn) loginBtn.style.display = "inline-block";
                if (registerBtn) registerBtn.style.display = "inline-block";
                if (adminBtn) adminBtn.style.display = "none";
                if (logoutBtn) logoutBtn.style.display = "none";
            }
        }

        updateNavbar();

        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                localStorage.removeItem('gw_role');
                localStorage.removeItem('gw_current_user');
                updateNavbar();
                window.location.reload();
            });
        }

        let currentProducts = [];
        let currentPackages = [];

        function productMatches(product) {
            const query = searchInput.value.trim().toLowerCase();
            const category = categoryFilter.value;
            const haystack = [
                product.name,
                product.description,
                getPackageName(product.category, currentPackages)
            ].join(" ").toLowerCase();

            return (!query || haystack.includes(query)) && (category === "all" || product.category === category);
        }

        function renderProductCard(product) {
            const whatsappMsg = encodeURIComponent(`Hello Susan, I'm interested in ordering: ${product.name} (Ksh ${product.price})`);

            return `
                <div class="col-md-6 col-xl-4">
                    <article class="product-card">
                        <span class="category-pill">${escapeHtml(getPackageName(product.category, currentPackages))}</span>
                        <div class="product-img-box">
                            <img src="${escapeHtml(product.image || "https://placehold.co/700x520/0a5c36/ffffff?text=Greenworld+Wellness")}" alt="${escapeHtml(product.name)}">
                        </div>
                        <div class="product-info">
                            <div class="d-flex justify-content-between gap-3 align-items-start mb-2">
                                <h2 class="h5 fw-bold mb-0">${escapeHtml(product.name)}</h2>
                                <div class="price-tag">Ksh ${escapeHtml(product.price || "0.00")}</div>
                            </div>
                            <p class="description-text mb-2">${escapeHtml(product.description || "")}</p>
                            ${product.benefits ? `
                                <div class="mb-3">
                                    <div class="small fw-bold text-success text-uppercase" style="letter-spacing: 1px; font-size: 0.7rem;">Key Benefits:</div>
                                    <p class="small text-white-50 mb-0">${escapeHtml(product.benefits)}</p>
                                </div>
                            ` : ''}
                            <a href="https://wa.me/254724415604?text=${whatsappMsg}" class="btn-order">
                                <i class="bi bi-whatsapp"></i> Order on WhatsApp
                            </a>
                        </div>
                    </article>
                </div>
            `;
        }

        function renderProducts() {
            const visibleProducts = currentProducts.filter(productMatches);
            grid.innerHTML = "";
            noProducts.style.display = visibleProducts.length ? "none" : "block";

            groupProducts(visibleProducts, currentPackages).forEach(group => {
                const section = document.createElement("section");
                section.className = "package-section";
                section.innerHTML = `
                    <div class="package-section-header">
                        <h2>${escapeHtml(group.name)}</h2>
                        <span>${group.products.length} product${group.products.length === 1 ? "" : "s"}</span>
                    </div>
                    <div class="row g-4">
                        ${group.products.map(renderProductCard).join("")}
                    </div>
                `;
                grid.appendChild(section);
            });
        };

        listenToPackages(pkgs => {
            currentPackages = pkgs;
            
            // Update category filter dropdown
            const filter = document.getElementById('categoryFilter');
            const currentVal = filter.value;
            filter.innerHTML = '<option value="all">All package categories</option>';
            pkgs.forEach(pkg => {
                const option = document.createElement('option');
                option.value = pkg.id;
                option.textContent = pkg.name;
                filter.appendChild(option);
            });
            filter.value = currentVal;

            if (currentProducts.length > 0) renderProducts();
        });

        listenToProducts(prods => {
            currentProducts = prods;
            renderProducts();
        });

        searchInput.addEventListener("input", renderProducts);
        categoryFilter.addEventListener("change", renderProducts);

        initPremiumBackground();

        function initPremiumBackground() {
            const canvas = document.getElementById("bg-canvas");
            const ctx = canvas.getContext("2d");
            const particles = [];
            const count = 150;
            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            function makeParticle() { return { x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, size: Math.random() * 2, speed: Math.random() * 0.5 + 0.1 }; }
            function draw() {
                ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "rgba(139, 195, 74, 0.5)";
                particles.forEach(p => { p.y -= p.speed; if (p.y < 0) p.y = canvas.height; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); });
                requestAnimationFrame(draw);
            }
            resize();
            for(let i=0; i<count; i++) particles.push(makeParticle());
            window.addEventListener("resize", resize);
            draw();
        }
    </script>
</body>
</html>
